<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Performance Prediction</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
height:100vh;
background:linear-gradient(135deg,#667eea,#764ba2);
display:flex;
justify-content:center;
align-items:center;
font-family:'Poppins',sans-serif;
}

.container{
width:850px;
background:rgba(255,255,255,0.1);
padding:40px;
border-radius:20px;
color:white;
box-shadow:0 15px 40px rgba(0,0,0,0.3);
}

form{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

input,select{
padding:12px;
border-radius:8px;
border:none;
}

button{
grid-column:span 2;
padding:14px;
border:none;
border-radius:25px;
background:#ff7e5f;
color:white;
font-size:16px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="container">
<h2>Student Performance Prediction</h2>

<form action="/predict" method="POST">

<input type="number" name="attendance" placeholder="Attendance (%)" min="0" max="100" required>

<input type="number" name="study_hours" placeholder="Study Hours per Day" min="0" max="15" step="0.5" required>

<input type="number" name="study_sessions" placeholder="Study Sessions per Day" min="1" max="10" required>

<input type="number" step="0.01" name="previous_sgpa"
placeholder="Previous SGPA (Enter 0 if 1st sem)" min="0" max="10" required>

<input type="number" name="social_media" placeholder="Social Media Hours" min="0" max="12" required>

<select name="consultancy" required>
<option value="">Consultancy Taken?</option>
<option value="1">Yes</option>
<option value="0">No</option>
</select>

<select name="cocurricular" required>
<option value="">Co-curricular Activities?</option>
<option value="1">Yes</option>
<option value="0">No</option>
</select>

<select name="backlog" required>
<option value="">Backlog Status</option>
<option value="0">No Backlogs</option>
<option value="1">Has Backlogs</option>
</select>

<button type="submit">Predict Performance</button>

</form>
</div>

</body>
</html>
